<!DOCTYPE html>
<html>
<head>
    <title>Pseudo Classes Task</title>

    <style>
        /* Background using :root */
        :root {
            background-color: rgb(135, 206, 235);
        }

div p:first-child{
	background-color:black;
	color:white;
}
		
div p:nth-child(2){

	color:black;
}
		
div p:last-child{

	color:red;
}

		ul li{
			background-color:gray;
			width:50%;
			padding:10px;
		}

		ul li:first-child,
		ul li:last-child{
			font-size:22px;
		}
		ul li:nth-last-child(odd){
			background-color:white;
		}

		ul li:nth-child(3){
			background-color:pink;
		}
			
		}
    
    </style>

</head>

<body>

    <div>
        <p>First paragraph - white text on black background.</p>
        <p>Second paragraph - normal text color.</p>
        <p>Third paragraph - red text.</p>
    </div>

    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Item 5</li>
    </ul>

</body>
</html>
